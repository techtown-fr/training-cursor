version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      slidev:
        patterns:
          - "@slidev/*"
          - "slidev-theme-*"
      dev-tools:
        patterns:
          - "husky"
          - "lint-staged"
          - "markdownlint-cli2"
          - "playwright-chromium"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
